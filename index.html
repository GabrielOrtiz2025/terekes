<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#fff;
    color:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TITULO */
h2{
    margin-top:30px;
}

/* BOTONERA */
.nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin:30px 0;
}

.nav button{
    padding:10px 18px;
    border-radius:20px;
    border:1px solid #ddd;
    background:#fff;
    color:#333;
    cursor:pointer;
    transition:.2s;
}

.nav button.active{
    border:1px solid #999;
    background:#f5f5f5;
}

/* GALERIA CORRECTA */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 483px); /* 3 por fila */
    gap:20px;
    justify-content:center;
}

/* CARD */
.card{
    width:483px;
    height:604px;
    border:1px solid #e5e5e5;
    border-radius:14px;
    overflow:hidden;
    background:#fff;
    display:flex;
    flex-direction:column;
}

/* IMAGEN */
.card img{
    width:100%;
    height:80%;
    object-fit:cover;
}

/* INFO */
.info{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* BOTON WHATSAPP */
.btn{
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    cursor:pointer;
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

/* ICONO */
.btn img{
    width:18px;
    height:18px;
}
</style>
</head>

<body>

<h2>TU MARCA</h2>

<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}">

            <div class="info">
                <b>${p.nombre}</b>
                <span>${p.desc}</span>

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir este producto
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    const filtrados=productos.filter(p=>p.categoria===cat);
    render(filtrados);
}

function comprar(nombre){
    const texto=`Hola, quiero pedir este producto: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

/* DEFAULT */
render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
