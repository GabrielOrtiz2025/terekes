<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#fff;
    color:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
h2{
    margin:50px 0 10px;
    font-weight:500;
    letter-spacing:1px;
}

/* BOTONERA */
.nav{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:50px;
}

.nav button{
    padding:10px 20px;
    border-radius:30px;
    border:1px solid #e0e0e0;
    background:#fff;
    color:#444;
    cursor:pointer;
    font-size:13px;
    transition:.25s;
}

.nav button:hover{
    border-color:#999;
}

.nav button.active{
    border-color:#111;
    color:#111;
}

/* GALERIA */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 240px); /* 50% más pequeño */
    gap:60px; /* MÁS ESPACIO */
    justify-content:center;
    margin-bottom:80px;
}

/* CARD */
.card{
    width:240px;
    height:320px;
    border-radius:14px;
    overflow:hidden;
    background:#fff;
    border:1px solid #eee;
    display:flex;
    flex-direction:column;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* IMAGEN */
.card img{
    width:100%;
    height:65%;
    object-fit:cover;
}

/* INFO */
.info{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

.info b{
    font-size:13px;
    font-weight:500;
}

.info span{
    font-size:11px;
    color:#777;
}

/* BOTON */
.btn{
    margin-top:8px;
    padding:9px;
    border-radius:20px;
    border:1px solid #ddd;
    background:#fff;
    font-size:11px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:.25s;
}

.btn:hover{
    background:#111;
    color:#fff;
    border-color:#111;
}

.btn img{
    width:14px;
}

</style>
</head>

<body>

<h2>TU MARCA</h2>

<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}">

            <div class="info">
                <b>${p.nombre}</b>
                <span>${p.desc}</span>

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    const filtrados=productos.filter(p=>p.categoria===cat);
    render(filtrados);
}

function comprar(nombre){
    const texto=`Hola, quiero pedir este producto: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

/* DEFAULT */
render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
