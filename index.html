<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #111;
}

/* HEADER */
header {
    padding: 60px 20px 30px;
    text-align: center;
}

header h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 2px;
}

header p {
    margin-top: 10px;
    font-size: 14px;
    color: #777;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    border: 1px solid #eee;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    display: block;
}

.card-content {
    padding: 15px;
}

.card h3 {
    font-size: 15px;
    font-weight: 500;
}

.price {
    margin-top: 5px;
    font-size: 14px;
    color: #555;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 14px;
    font-size: 13px;
    text-decoration: none;
    border: 1px solid #111;
    color: #111;
    transition: 0.3s;
}

.btn:hover {
    background: #111;
    color: #fff;
}

/* AGOTADO */
.sold {
    margin-top: 12px;
    font-size: 12px;
    color: #999;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    color: #aaa;
}

</style>
</head>

<body>

<header>
    <h1>TU MARCA</h1>
    <p>Pijamas y accesorios fuera de lo común</p>
</header>

<div class="container">
    <div class="grid">

        <!-- PRODUCTO -->
        <div class="card">
            <img src="https://via.placeholder.com/400x500">
            <div class="card-content">
                <h3>Pijama Anime</h3>
                <div class="price">$25</div>
                <a class="btn" href="https://wa.me/593XXXXXXXXX?text=Quiero%20la%20pijama%20anime">Comprar</a>
            </div>
        </div>

        <!-- PRODUCTO AGOTADO -->
        <div class="card">
            <img src="https://via.placeholder.com/400x500">
            <div class="card-content">
                <h3>Edición Limitada</h3>
                <div class="price">$30</div>
                <div class="sold">Agotado</div>
            </div>
        </div>

    </div>
</div>

<footer>
    © 2026 TU MARCA
</footer>

</body>
</html>
