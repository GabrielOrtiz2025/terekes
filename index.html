<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;}

.banner{height:350px;overflow:hidden;}
.slides{display:flex;width:400%;height:100%;animation:slide 16s infinite;}
.slides img{width:100%;object-fit:cover;}

@keyframes slide{
0%,20%{transform:translateX(0);}
25%,45%{transform:translateX(-100%);}
50%,70%{transform:translateX(-200%);}
75%,95%{transform:translateX(-300%);}
100%{transform:translateX(0);}
}

.nav{display:flex;justify-content:center;gap:10px;padding:20px;}
.nav button{padding:10px 18px;border-radius:20px;border:1px solid #ddd;background:#fff;}

.grid{display:grid;grid-template-columns:repeat(3,240px);gap:60px;justify-content:center;}

.card{border:1px solid #eee;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}

.img-producto{width:100%;height:260px;object-fit:cover;cursor:pointer;}

.info{padding:10px;}

.btn{
margin-top:12px;padding:10px;border-radius:30px;border:1px solid #ddd;background:#fff;
display:flex;align-items:center;justify-content:center;gap:8px;
font-size:12px;cursor:pointer;width:100%;
}

.btn:hover{background:#111;color:#fff;border-color:#111;}
.btn img{width:16px;height:16px;}

.modal{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;justify-content:center;align-items:center;flex-direction:column;
z-index:1000;
}

.modal img{max-width:90%;max-height:70%;}

.controls{display:flex;gap:20px;margin-top:20px;}
.controls button{padding:10px 20px;cursor:pointer;}

.cerrar{margin-top:15px;padding:8px 20px;}

@media(max-width:700px){
.grid{grid-template-columns:1fr;padding:20px;}
.banner{height:200px;}
}
</style>
</head>

<body>

<div class="banner">
<div class="slides">
<img src="img/banner1.jpg">
<img src="img/banner2.jpg">
<img src="img/banner3.jpg">
<img src="img/banner4.jpg">
</div>
</div>

<div class="nav">
<button onclick="filtrar('pijamas')">Pijamas</button>
<button onclick="filtrar('accesorios')">Accesorios</button>
<button onclick="filtrar('mugs')">Mugs</button>
<button onclick="filtrar('camisetas')">Camisetas</button>
<button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<div class="modal" id="modal">
<img id="imgModal">

<div class="controls">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<button class="cerrar" onclick="cerrarModal()">Cerrar</button>
</div>

<script src="productos.js"></script>

<script>

let currentImgs = [];
let index = 0;
let productosActuales = [];

function render(data){
    productosActuales = data;

    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach((p,i)=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}" class="img-producto" data-index="${i}">

            <div class="info">
                <b>${p.nombre}</b><br>
                ${p.desc}

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir este producto
                </button>
            </div>
        </div>`;
    });
}

/* 🔥 CLICK SEGURO */
document.getElementById("productos").addEventListener("click", function(e){
    if(e.target.classList.contains("img-producto")){
        const i = e.target.dataset.index;
        abrirModal(productosActuales[i].imgs);
    }
});

function filtrar(cat){
    render(productos.filter(p=>p.categoria===cat));
}

function comprar(nombre){
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=Hola quiero ${nombre}`);
}

function abrirModal(imgs){
    currentImgs = imgs;
    index = 0;
    document.getElementById("modal").style.display="flex";
    document.getElementById("imgModal").src=currentImgs[index];
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

function next(){
    index = (index + 1) % currentImgs.length;
    document.getElementById("imgModal").src=currentImgs[index];
}

function prev(){
    index = (index - 1 + currentImgs.length) % currentImgs.length;
    document.getElementById("imgModal").src=currentImgs[index];
}

render(productos.filter(p=>p.categoria==="pijamas"));

</script>

</body>
</html>
