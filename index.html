<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#0f0f10;
    color:#fff;
}

/* HEADER */
header{
    text-align:center;
    padding:60px 20px 40px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
    font-size:24px;
    font-weight:400;
    letter-spacing:2px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:20px;
    padding:30px;
}

@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
    background:#1a1a1c;
    border:1px solid rgba(255,255,255,0.05);
    transition:.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.9;
}

/* tamaños */
.big{grid-column:span 3;height:420px;}
.medium{grid-column:span 2;height:320px;}
.small{grid-column:span 1;height:260px;}

@media(max-width:900px){
    .big,.medium,.small{
        grid-column:span 2;
        height:300px;
    }
}

/* overlay */
.info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:15px;
    background:linear-gradient(transparent,rgba(0,0,0,0.8));
}

.info h3{
    font-size:14px;
    font-weight:400;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#0f0f10;
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:90%;
    max-width:500px;
}

.modal img{
    width:100%;
    border-radius:14px;
}

.thumbs{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.thumbs img{
    width:60px;
    border-radius:8px;
    cursor:pointer;
    opacity:0.6;
}

.thumbs img:hover{opacity:1;}

select{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#1a1a1c;
    color:#fff;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
}

/* botón elegante */
.btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#fff;
    color:#000;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:13px;
    letter-spacing:1px;
}
</style>
</head>

<body>

<header>
    <h1>TU MARCA</h1>
</header>

<div class="grid" id="productos"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <img id="mainImg">
        <div class="thumbs" id="thumbs"></div>

        <h3 id="nombre"></h3>

        <select id="color"></select>
        <select id="talla"></select>

        <button class="btn" onclick="enviar()">ENVIAR A WHATSAPP</button>
    </div>
</div>

<script src="productos.js"></script>

<script>
let productoActual=null;

function render(){
    const cont=document.getElementById("productos");
    productos.forEach((p,i)=>{
        cont.innerHTML+=`
        <div class="card ${p.size}" onclick="abrir(${i})">
            <img src="${p.imgs[0]}">
            <div class="info"><h3>${p.nombre}</h3></div>
        </div>`;
    });
}

function abrir(i){
    productoActual=productos[i];
    document.getElementById("modal").style.display="flex";
    document.getElementById("mainImg").src=productoActual.imgs[0];
    document.getElementById("nombre").innerText=productoActual.nombre;

    const thumbs=document.getElementById("thumbs");
    thumbs.innerHTML="";
    productoActual.imgs.forEach(img=>{
        thumbs.innerHTML+=`<img src="${img}" onclick="cambiar('${img}')">`;
    });

    const color=document.getElementById("color");
    color.innerHTML="";
    productoActual.colores.forEach(c=>{
        color.innerHTML+=`<option>${c}</option>`;
    });

    const talla=document.getElementById("talla");
    talla.innerHTML="";
    productoActual.tallas.forEach(t=>{
        talla.innerHTML+=`<option>${t}</option>`;
    });
}

function cambiar(img){
    document.getElementById("mainImg").src=img;
}

function enviar(){
    const color=document.getElementById("color").value;
    const talla=document.getElementById("talla").value;

    const texto=`Hola, quiero este producto:
${productoActual.nombre}
Color: ${color}
Talla: ${talla}`;

    window.open(`https://wa.me/593TU_NUMERO?text=${encodeURIComponent(texto)}`);
}

document.getElementById("modal").onclick=function(e){
    if(e.target.id==="modal"){
        this.style.display="none";
    }
}

render();
</script>

</body>
</html>
