<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#fff;
    color:#111;
}

/* HEADER */
header{
    padding:60px 20px 30px;
    text-align:center;
}

header h1{
    font-size:28px;
    font-weight:500;
    letter-spacing:1px;
}

header p{
    margin-top:8px;
    color:#777;
    font-size:14px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding-bottom:20px;
    flex-wrap:wrap;
}

.nav button{
    border:none;
    background:#f2f2f2;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
    transition:.3s;
}

.nav button:hover{
    background:#111;
    color:#fff;
}

/* GRID APPLE STYLE */
.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:20px;
}

@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
}

/* CARD */
.card{
    border-radius:18px;
    overflow:hidden;
    background:#f7f7f7;
    position:relative;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* tamaños dinámicos */
.big{grid-column:span 3;height:400px;}
.medium{grid-column:span 2;height:300px;}
.small{grid-column:span 1;height:250px;}

@media(max-width:900px){
    .big,.medium,.small{
        grid-column:span 2;
        height:300px;
    }
}

/* overlay */
.info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:15px;
    background:linear-gradient(transparent,rgba(0,0,0,0.7));
    color:#fff;
}

.info h3{
    font-size:14px;
    font-weight:500;
}

.price{
    font-size:13px;
    opacity:.8;
}

/* botones */
.btn{
    display:inline-block;
    margin-top:8px;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    text-decoration:none;
    background:#fff;
    color:#111;
}

.sold{
    font-size:12px;
    opacity:.7;
}

/* footer */
footer{
    text-align:center;
    padding:40px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>TU MARCA</h1>
    <p>Diseños fuera de lo común</p>
</header>

<div class="nav">
    <button onclick="filtrar('todos')">Todo</button>
    <button onclick="filtrar('pijamas')">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
</div>

<div class="container">
    <div class="grid" id="productos"></div>
</div>

<footer>© 2026 TU MARCA</footer>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card ${p.size}">
            <img src="${p.img}">
            <div class="info">
                <h3>${p.nombre}</h3>
                <div class="price">$${p.precio}</div>
                ${
                    p.agotado
                    ? `<div class="sold">Agotado</div>`
                    : `<a class="btn" href="https://wa.me/593XXXXXXXXX?text=Quiero%20${p.nombre}">Comprar</a>`
                }
            </div>
        </div>`;
    });
}

function filtrar(cat){
    if(cat==="todos") return render(productos);
    render(productos.filter(p=>p.categoria===cat));
}

render(productos);
</script>

</body>
</html>
