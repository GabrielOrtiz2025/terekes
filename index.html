<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#1c1c1e;
    color:#f2f2f2;
}

/* HEADER */
header{
    text-align:center;
    padding:40px 20px 10px;
}

/* BOTONERA PRO */
.nav{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
}

.nav button{
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:#2a2a2d;
    color:#fff;
    cursor:pointer;
    font-size:13px;
    transition:.3s;
}

.nav button:hover{
    background:#fff;
    color:#000;
}

.nav button.active{
    background:#fff;
    color:#000;
}

/* GALERÍA 3 FILAS */
.gallery-wrapper{
    overflow-x:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-auto-flow:column;
    grid-template-rows:repeat(3, 250px);
    gap:15px;
    width:max-content;
}

.card{
    width:220px;
    border-radius:16px;
    overflow:hidden;
    background:#2a2a2d;
    border:1px solid rgba(255,255,255,0.08);
    cursor:pointer;
    position:relative;
    transition:.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* overlay */
.info{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:10px;
    background:linear-gradient(transparent,rgba(0,0,0,0.8));
    font-size:12px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#1c1c1e;
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:90%;
    max-width:500px;
}

.modal img{
    width:100%;
    border-radius:12px;
}

.thumbs{
    display:flex;
    gap:5px;
    margin-top:10px;
}

.thumbs img{
    width:60px;
    border-radius:6px;
    cursor:pointer;
}

select{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#2a2a2d;
    color:#fff;
    border:none;
    border-radius:8px;
}

.btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#fff;
    color:#000;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h2>TU MARCA</h2>
</header>

<!-- BOTONERA -->
<div class="nav">
    <button onclick="filtrar('todos')" class="active">Todo</button>
    <button onclick="filtrar('pijamas')">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<!-- GALERÍA -->
<div class="gallery-wrapper">
    <div class="grid" id="productos"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <img id="mainImg">
        <div class="thumbs" id="thumbs"></div>

        <h3 id="nombre"></h3>
        <p id="desc"></p>

        <select id="color"></select>
        <select id="talla"></select>

        <button class="btn" onclick="enviar()">Enviar a WhatsApp</button>
    </div>
</div>

<script src="productos.js"></script>

<script>
let productoActual=null;

function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";
    data.forEach((p,i)=>{
        cont.innerHTML+=`
        <div class="card" onclick="abrir(${i})">
            <img src="${p.imgs[0]}">
            <div class="info">${p.nombre}</div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(btn=>btn.classList.remove("active"));
    event.target.classList.add("active");

    if(cat==="todos") return render(productos);
    render(productos.filter(p=>p.categoria===cat));
}

function abrir(i){
    productoActual=productos[i];
    document.getElementById("modal").style.display="flex";
    document.getElementById("mainImg").src=productoActual.imgs[0];
    document.getElementById("nombre").innerText=productoActual.nombre;
    document.getElementById("desc").innerText=productoActual.desc;

    const thumbs=document.getElementById("thumbs");
    thumbs.innerHTML="";
    productoActual.imgs.forEach(img=>{
        thumbs.innerHTML+=`<img src="${img}" onclick="cambiar('${img}')">`;
    });

    const color=document.getElementById("color");
    color.innerHTML="";
    productoActual.colores.forEach(c=>{
        color.innerHTML+=`<option>${c}</option>`;
    });

    const talla=document.getElementById("talla");
    talla.innerHTML="";
    productoActual.tallas.forEach(t=>{
        talla.innerHTML+=`<option>${t}</option>`;
    });
}

function cambiar(img){
    document.getElementById("mainImg").src=img;
}

function enviar(){
    const color=document.getElementById("color").value;
    const talla=document.getElementById("talla").value;

    const texto=`Hola, quiero este producto:
${productoActual.nombre}
${productoActual.desc}
Color: ${color}
Talla: ${talla}`;

    window.open(`https://wa.me/593998588745?text=${encodeURIComponent(texto)}`);
}

document.getElementById("modal").onclick=function(e){
    if(e.target.id==="modal"){
        this.style.display="none";
    }
}

render(productos);
</script>

</body>
</html>
