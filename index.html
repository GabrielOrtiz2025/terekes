<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#fff;color:#111;}

header{text-align:center;padding:50px 20px;}

.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:20px;
    padding:20px;
}

.card{
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
}

.card img{width:100%;height:100%;object-fit:cover;}

.big{grid-column:span 3;height:400px;}
.medium{grid-column:span 2;height:300px;}
.small{grid-column:span 1;height:250px;}

@media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr);}
    .big,.medium,.small{grid-column:span 2;height:300px;}
}

/* MODAL */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    padding:20px;
    border-radius:16px;
    max-width:500px;
    width:90%;
}

.modal img{
    width:100%;
    border-radius:10px;
}

.thumbs{
    display:flex;
    gap:5px;
    margin-top:10px;
}

.thumbs img{
    width:60px;
    cursor:pointer;
    border-radius:6px;
}

select{
    width:100%;
    padding:8px;
    margin-top:10px;
}

.btn{
    margin-top:15px;
    padding:10px;
    width:100%;
    border:none;
    background:#111;
    color:#fff;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>TU MARCA</h2>
</header>

<div class="grid" id="productos"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <img id="mainImg">
        
        <div class="thumbs" id="thumbs"></div>

        <h3 id="nombre"></h3>

        <select id="color"></select>
        <select id="talla"></select>

        <button class="btn" onclick="enviar()">Enviar por WhatsApp</button>
    </div>
</div>

<script src="productos.js"></script>

<script>
let productoActual=null;

function render(){
    const cont=document.getElementById("productos");
    productos.forEach((p,i)=>{
        cont.innerHTML+=`
        <div class="card ${p.size}" onclick="abrir(${i})">
            <img src="${p.imgs[0]}">
        </div>`;
    });
}

function abrir(i){
    productoActual=productos[i];
    document.getElementById("modal").style.display="flex";
    document.getElementById("mainImg").src=productoActual.imgs[0];
    document.getElementById("nombre").innerText=productoActual.nombre;

    // thumbnails
    const thumbs=document.getElementById("thumbs");
    thumbs.innerHTML="";
    productoActual.imgs.forEach(img=>{
        thumbs.innerHTML+=`<img src="${img}" onclick="cambiar('${img}')">`;
    });

    // colores
    const color=document.getElementById("color");
    color.innerHTML="";
    productoActual.colores.forEach(c=>{
        color.innerHTML+=`<option>${c}</option>`;
    });

    // tallas
    const talla=document.getElementById("talla");
    talla.innerHTML="";
    productoActual.tallas.forEach(t=>{
        talla.innerHTML+=`<option>${t}</option>`;
    });
}

function cambiar(img){
    document.getElementById("mainImg").src=img;
}

function enviar(){
    const color=document.getElementById("color").value;
    const talla=document.getElementById("talla").value;

    const texto=`Hola, quiero este producto:
${productoActual.nombre}
Color: ${color}
Talla: ${talla}`;

    window.open(`https://wa.me/593XXXXXXXXX?text=${encodeURIComponent(texto)}`);
}

// cerrar modal
document.getElementById("modal").onclick=function(e){
    if(e.target.id==="modal"){
        this.style.display="none";
    }
}

render();
</script>

</body>
</html>
