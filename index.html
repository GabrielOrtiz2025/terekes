<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:#f5f5dc;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* BOTONERA */
.nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin:30px 0;
}

.nav button{
    padding:10px 20px;
    border-radius:20px;
    border:1px solid #556b2f;
    background:#111;
    color:#f5f5dc;
    cursor:pointer;
}

.nav button.active{
    background:#556b2f;
    color:#fff;
}

/* GALERIA */
.grid{
    display:grid;
    grid-auto-flow:column;
    grid-template-rows:repeat(3,604px);
    gap:20px;
    justify-content:center;
}

.card{
    width:483px;
    height:604px;
    position:relative;
    overflow:hidden;
    border-radius:16px;
    background:#111;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* overlay */
.info{
    position:absolute;
    bottom:0;
    width:100%;
    padding:15px;
    background:linear-gradient(transparent,black);
}

/* BOTON WHATSAPP */
.btn{
    margin-top:10px;
    padding:8px;
    background:#556b2f;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    width:100%;
}
</style>
</head>

<body>

<h2>TU MARCA</h2>

<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}">
            <div class="info">
                <b>${p.nombre}</b><br>
                ${p.desc}
                <button class="btn" onclick="comprar('${p.nombre}')">
                    Enviar por WhatsApp
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    const filtrados=productos.filter(p=>p.categoria===cat);
    render(filtrados);
}

function comprar(nombre){
    const texto=`Hola, quiero comprar: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
