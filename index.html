<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#fff;
    color:#111;
}

/* 🔥 BANNER SLIDER */
.banner{
    width:100%;
    height:350px;
    overflow:hidden;
    position:relative;
}

.slides{
    display:flex;
    width:400%;
    height:100%;
    animation:slide 16s infinite;
}

.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes slide{
    0%{transform:translateX(0);}
    25%{transform:translateX(-100%);}
    50%{transform:translateX(-200%);}
    75%{transform:translateX(-300%);}
    100%{transform:translateX(0);}
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    gap:12px;
    padding:25px;
    flex-wrap:wrap;
}

.nav button{
    padding:10px 18px;
    border-radius:30px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
}

.nav button.active{
    border-color:#111;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 240px);
    gap:60px;
    justify-content:center;
    padding-bottom:80px;
}

/* CARD */
.card{
    width:240px;
    border:1px solid #eee;
    border-radius:14px;
    overflow:hidden;
    background:#fff;
    display:flex;
    flex-direction:column;
}

/* IMG */
.card img{
    width:100%;
    height:260px;
    object-fit:cover;
    cursor:pointer;
}

/* INFO */
.info{
    padding:12px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    flex-grow:1;
}

.info b{
    font-size:13px;
}

.info span{
    font-size:11px;
    color:#777;
}

/* BOTÓN */
.btn{
    margin-top:12px;
    padding:10px;
    border-radius:30px;
    border:1px solid #ddd;
    background:#fff;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    font-size:12px;
    cursor:pointer;
    width:100%;
}

.btn:hover{
    background:#111;
    color:#fff;
    border-color:#111;
}

.btn img{
    width:16px;
    height:16px;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.modal img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:30px;
        padding:0 20px 60px;
    }

    .card{
        width:100%;
    }
}

@media(max-width:500px){
    .grid{
        grid-template-columns:1fr;
    }

    .banner{
        height:220px;
    }
}

</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">
    <div class="slides">
        <img src="img/banner1.jpg">
        <img src="img/banner2.jpg">
        <img src="img/banner3.jpg">
        <img src="img/banner4.jpg">
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<!-- GALERÍA -->
<div class="grid" id="productos"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
    <img id="imgModal">
</div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}" onclick="abrirModal('${p.imgs[0]}')">

            <div class="info">
                <b>${p.nombre}</b>
                <span>${p.desc}</span>

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir este producto
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    render(productos.filter(p=>p.categoria===cat));
}

function comprar(nombre){
    const texto=`Hola, quiero pedir este producto: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

/* MODAL */
function abrirModal(img){
    document.getElementById("modal").style.display="flex";
    document.getElementById("imgModal").src=img;
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

/* INIT */
render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
