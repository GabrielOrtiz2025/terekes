<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#fff;
    color:#111;
}

/* BANNER */
.banner{
    height:250px;
    background:url('img/banner.jpg') center/cover no-repeat;
}

/* NAV */
.nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:20px;
}

.nav button{
    padding:10px 18px;
    border-radius:20px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
}

.nav button.active{
    border-color:#111;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 240px);
    gap:50px;
    justify-content:center;
}

/* CARD */
.card{
    border:1px solid #eee;
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.info{
    padding:10px;
}

/* BOTON */
.btn{
    margin-top:10px;
    height:40px;
    border-radius:25px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.btn img{
    width:16px;
}

/* 🔥 MODAL (VISOR) */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.modal img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="banner"></div>

<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<!-- 🔥 MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
    <img id="imgModal">
</div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}" onclick="abrirModal('${p.imgs[0]}')">

            <div class="info">
                <b>${p.nombre}</b><br>
                <span>${p.desc}</span>

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir este producto
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
    render(productos.filter(p=>p.categoria===cat));
}

function comprar(nombre){
    const texto=`Hola, quiero pedir: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

/* 🔥 MODAL FUNCIONES */
function abrirModal(img){
    document.getElementById("modal").style.display="flex";
    document.getElementById("imgModal").src=img;
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

/* INIT */
render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
