<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Marca</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#fff;
    color:#111;
}

/* 🔥 BANNER */
.banner{
    width:100%;
    height:280px;
    background:url('img/banner.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.banner::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

.banner h1{
    position:relative;
    color:#fff;
    font-weight:500;
    letter-spacing:2px;
}

/* BOTONERA */
.nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.nav button{
    padding:10px 18px;
    border-radius:30px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
}

.nav button.active{
    border-color:#111;
}

/* GALERIA */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 240px);
    gap:50px;
    justify-content:center;
    padding-bottom:60px;
}

/* CARD */
.card{
    width:240px;
    border:1px solid #eee;
    border-radius:14px;
    overflow:hidden;
    background:#fff;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMG */
.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

/* INFO */
.info{
    padding:10px;
}

.info b{
    font-size:13px;
}

.info span{
    font-size:11px;
    color:#777;
}

/* BOTON */
.btn{
    margin-top:10px;
    padding:8px;
    border-radius:20px;
    border:1px solid #ddd;
    background:#fff;
    font-size:11px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

.btn img{
    width:14px;
}

/* 🔥 RESPONSIVE */
@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:30px;
    }

    .card{
        width:100%;
    }
}

@media(max-width:500px){
    .grid{
        grid-template-columns:1fr;
        gap:25px;
        padding:0 20px 60px;
    }

    .banner{
        height:200px;
    }

    .banner h1{
        font-size:20px;
    }
}

</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">
    <h1>TU MARCA</h1>
</div>

<!-- NAV -->
<div class="nav">
    <button onclick="filtrar('pijamas')" class="active">Pijamas</button>
    <button onclick="filtrar('accesorios')">Accesorios</button>
    <button onclick="filtrar('mugs')">Mugs</button>
    <button onclick="filtrar('camisetas')">Camisetas</button>
    <button onclick="filtrar('hoodies')">Hoodies</button>
</div>

<div class="grid" id="productos"></div>

<script src="productos.js"></script>

<script>
function render(data){
    const cont=document.getElementById("productos");
    cont.innerHTML="";

    data.forEach(p=>{
        cont.innerHTML+=`
        <div class="card">
            <img src="${p.imgs[0]}">

            <div class="info">
                <b>${p.nombre}</b><br>
                <span>${p.desc}</span>

                <button class="btn" onclick="comprar('${p.nombre}')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                    Quiero pedir
                </button>
            </div>
        </div>`;
    });
}

function filtrar(cat){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    render(productos.filter(p=>p.categoria===cat));
}

function comprar(nombre){
    const texto=`Hola, quiero pedir: ${nombre}`;
    window.open(`https://api.whatsapp.com/send?phone=593998588745&text=${encodeURIComponent(texto)}`);
}

render(productos.filter(p=>p.categoria==="pijamas"));
</script>

</body>
</html>
